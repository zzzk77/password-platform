events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;

        client_max_body_size 10M;

        # 攻击端前端 (静态文件)
        location / {
            alias /app/dist/attack/;
            try_files $uri $uri/ /index.html;
        }

        # 防御端前端
        location /defense/ {
            alias /app/dist/defense/;
            try_files $uri $uri/ /defense/index.html;
        }

        # API代理 - 使用upstream
        location /api/ {
            proxy_pass http://host.docker.internal:4001/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
        }

        # CTF靶场
        location /ctf/ {
            proxy_pass http://range-classical-ctf:8081/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 通信靶场
        location /comm/ {
            proxy_pass http://range-classical-communication:8082/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 破解靶场
        location /crack/ {
            proxy_pass http://range-classical-crack:8083/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
