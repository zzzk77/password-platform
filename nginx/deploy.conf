server {
    listen 80;
    server_name localhost;

    # 前端攻击端
    location / {
        root /app/dist/attack;
        try_files $uri $uri/ /index.html;
    }

    # 前端防御端
    location /defense {
        alias /app/dist/defense;
        try_files $uri $uri/ /defense/index.html;
    }

    # API代理
    location /api/ {
        proxy_pass http://backend:4000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # CTF靶场
    location /ctf/ {
        proxy_pass http://range-classical-ctf:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 古典通信靶场
    location /comm/ {
        proxy_pass http://range-classical-communication:8082/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 古典破解靶场
    location /crack/ {
        proxy_pass http://range-classical-crack:8083/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
