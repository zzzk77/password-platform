<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTF入门密码题靶场</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .challenge {
            background-color: #f9f9f9;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            border-left: 4px solid #4CAF50;
        }
        h2 {
            color: #4CAF50;
            margin-bottom: 10px;
        }
        p {
            margin-bottom: 15px;
        }
        .flag-form {
            margin-top: 30px;
            padding: 20px;
            background-color: #f0f8ff;
            border-radius: 8px;
        }
        .flag-form h3 {
            color: #1E90FF;
            margin-bottom: 15px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        #result {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CTF入门密码题靶场</h1>
        
        <div class="challenge">
            <h2>挑战1：凯撒密码</h2>
            <p>描述：测试凯撒密码的破解方法，适合CTF入门。</p>
            <p>密文：LXFOPVEFRNHR</p>
            <p>提示：尝试不同的偏移量，找到正确的明文。</p>
        </div>
        
        <div class="challenge">
            <h2>挑战2：栅栏密码</h2>
            <p>描述：测试栅栏密码的加密和解密方法。</p>
            <p>密文：TEOGSDYUTAENNHLNETAMSHVAED</p>
            <p>提示：尝试不同的栅栏数，找到正确的明文。</p>
        </div>
        
        <div class="challenge">
            <h2>挑战3：简单替换密码</h2>
            <p>描述：测试简单替换密码的破解方法。</p>
            <p>密文：QJBQBO</p>
            <p>提示：使用频率分析或尝试常见的替换模式。</p>
        </div>
        
        <div class="flag-form">
            <h3>提交Flag</h3>
            <select id="challenge-select">
                <option value="凯撒密码">凯撒密码</option>
                <option value="栅栏密码">栅栏密码</option>
                <option value="简单替换密码">简单替换密码</option>
            </select>
            <input type="text" id="flag-input" placeholder="输入Flag">
            <button onclick="submitFlag()">提交</button>
            <div id="result"></div>
        </div>
    </div>
    
    <script>
        function submitFlag() {
            const challenge = document.getElementById('challenge-select').value;
            const flag = document.getElementById('flag-input').value;
            const resultDiv = document.getElementById('result');
            
            fetch('/submit-flag', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ challenge: challenge, flag: flag })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    resultDiv.className = 'success';
                    resultDiv.textContent = data.message;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.textContent = data.message;
                }
            })
            .catch(error => {
                resultDiv.className = 'error';
                resultDiv.textContent = '提交失败，请重试';
            });
        }
    </script>
</body>
</html>
